<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .message-bubble { max-width: 80%; word-wrap: break-word; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div id="join-screen" class="w-full max-w-md p-4">
        <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-indigo-500/20 p-4 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Secret Chat</h1>
                <p class="text-slate-400 mt-2 text-center">Direct browser-to-browser encrypted messaging.</p>
            </div>

            <form id="join-form" class="space-y-5">
                <div id="status-msg" class="hidden text-sm p-3 rounded-lg text-center mb-4"></div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Room Secret Code</label>
                    <input type="text" id="join-code" required class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="e.g. dragon-blue-99">
                    <p class="text-[10px] text-slate-500 mt-1">One person clicks "Host", the other clicks "Join".</p>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Nickname</label>
                    <input type="text" id="join-name" required class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="Your name">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button type="button" id="host-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2">
                        <span>Host</span>
                    </button>
                    <button type="button" id="connect-btn" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2">
                        <span>Join</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="chat-screen" class="hidden w-full h-full max-w-4xl sm:h-[85vh] flex flex-col bg-slate-800 sm:rounded-2xl shadow-2xl border-0 sm:border border-slate-700 overflow-hidden">
        <div class="bg-slate-800/90 backdrop-blur-md border-b border-slate-700 p-4 flex items-center justify-between z-10">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                <div>
                    <h2 id="display-room-name" class="text-white font-bold leading-tight">Secret Chat</h2>
                    <p class="text-xs text-slate-400">Chatting as <span id="display-user-name" class="text-slate-300 font-medium">...</span></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-white px-3 py-2 rounded-lg transition-colors text-sm font-medium">Exit</button>
        </div>

        <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-900/50 custom-scrollbar flex flex-col">
            <div class="text-center text-slate-500 text-xs my-4">Connection established. Messages travel peer-to-peer.</div>
        </div>

        <div class="bg-slate-800 border-t border-slate-700 p-4">
            <form id="message-form" class="flex space-x-2 relative">
                <input type="text" id="message-input" autocomplete="off" placeholder="Type a message..." class="flex-1 bg-slate-900 border border-slate-700 text-white rounded-full pl-5 pr-12 py-3 focus:outline-none focus:border-indigo-500 transition-colors">
                <button type="submit" class="absolute right-1 top-1 bottom-1 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, deleteDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlxvGxLIBUrVO3WWmEcslFpSygeYVeHpY",
            authDomain: "pantherlearn-d6f7c.firebaseapp.com",
            projectId: "pantherlearn-d6f7c",
            storageBucket: "pantherlearn-d6f7c.firebasestorage.app",
            messagingSenderId: "293205883325",
            appId: "1:293205883325:web:c0c21ece0b4fc26f673ad4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:a.relay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:a.relay.metered.ca:80?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:a.relay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turns:a.relay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        let pc = null;
        let dataChannel = null;
        let myName = "";
        let roomCode = "";

        const joinScreen = document.getElementById('join-screen');
        const chatScreen = document.getElementById('chat-screen');
        const statusMsg = document.getElementById('status-msg');
        const messagesContainer = document.getElementById('messages-container');

        function showStatus(text, type = 'info') {
            statusMsg.textContent = text;
            statusMsg.className = `block text-sm p-3 rounded-lg text-center mb-4 ${type === 'error' ? 'bg-red-500/10 text-red-400' : 'bg-indigo-500/10 text-indigo-400'}`;
        }

        function appendMessage(sender, text, isMe) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
            msgDiv.innerHTML = `
                <span class="text-[10px] font-semibold text-slate-500 mb-1 px-1 uppercase">${isMe ? 'You' : sender}</span>
                <div class="message-bubble px-4 py-2.5 rounded-2xl shadow-sm text-sm ${isMe ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-slate-700 text-slate-100 rounded-bl-none'}">
                    ${escapeHtml(text)}
                </div>
            `;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function appendSystem(text) {
            const sysMsg = document.createElement('div');
            sysMsg.className = 'text-center text-slate-400 text-[10px] uppercase tracking-wider my-3 bg-slate-800 py-1 rounded-full w-max mx-auto px-4';
            sysMsg.textContent = text;
            messagesContainer.appendChild(sysMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function wireDataChannel(channel) {
            channel.onopen = () => {
                joinScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                document.getElementById('display-user-name').textContent = myName;
                channel.send(JSON.stringify({ type: 'name', name: myName }));
                cleanupSignaling();
            };
            channel.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'chat') appendMessage(data.sender, data.text, false);
                    else if (data.type === 'name') appendSystem(`${data.name} joined the chat`);
                } catch (_) {}
            };
            channel.onclose = () => {
                appendSystem('connection closed');
            };
        }

        async function cleanupSignaling() {
            try {
                const callerCands = await getDocs(collection(db, 'secretChatSignaling', roomCode, 'callerCandidates'));
                const calleeCands = await getDocs(collection(db, 'secretChatSignaling', roomCode, 'calleeCandidates'));
                await Promise.all([
                    ...callerCands.docs.map(d => deleteDoc(d.ref)),
                    ...calleeCands.docs.map(d => deleteDoc(d.ref))
                ]);
                await deleteDoc(doc(db, 'secretChatSignaling', roomCode));
            } catch (_) {}
        }

        function wireDiagnostics(p, role) {
            p.oniceconnectionstatechange = () => console.log(`[${role}] ICE ${p.iceConnectionState}`);
            p.onconnectionstatechange = () => console.log(`[${role}] conn ${p.connectionState}`);
            p.onicegatheringstatechange = () => console.log(`[${role}] gathering ${p.iceGatheringState}`);
            p.onicecandidateerror = (e) => console.warn(`[${role}] ICE error`, e.errorCode, e.errorText, e.url);
        }

        document.getElementById('host-btn').onclick = async () => {
            roomCode = document.getElementById('join-code').value.trim();
            myName = document.getElementById('join-name').value.trim();
            if (!roomCode || !myName) return showStatus("Need code and nickname", "error");

            const roomRef = doc(db, 'secretChatSignaling', roomCode);
            const existing = await getDoc(roomRef);
            if (existing.exists()) {
                return showStatus("That room is taken — pick another code or have your friend Join.", "error");
            }

            showStatus("Hosting — waiting for joiner...");
            pc = new RTCPeerConnection(rtcConfig);
            wireDiagnostics(pc, 'host');

            dataChannel = pc.createDataChannel('chat');
            wireDataChannel(dataChannel);

            const callerCandidates = collection(db, 'secretChatSignaling', roomCode, 'callerCandidates');
            const calleeCandidates = collection(db, 'secretChatSignaling', roomCode, 'calleeCandidates');

            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(callerCandidates, e.candidate.toJSON());
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, createdAt: serverTimestamp() });

            onSnapshot(roomRef, async (snap) => {
                const data = snap.data();
                if (data && data.answer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            onSnapshot(calleeCandidates, (snap) => {
                snap.docChanges().forEach((change) => {
                    if (change.type === 'added') {
                        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
                    }
                });
            });
        };

        document.getElementById('connect-btn').onclick = async () => {
            roomCode = document.getElementById('join-code').value.trim();
            myName = document.getElementById('join-name').value.trim();
            if (!roomCode || !myName) return showStatus("Need code and nickname", "error");

            showStatus("Joining...");
            const roomRef = doc(db, 'secretChatSignaling', roomCode);
            const roomSnap = await getDoc(roomRef);
            if (!roomSnap.exists() || !roomSnap.data().offer) {
                return showStatus("No host found for that code. Make sure they clicked Host first.", "error");
            }

            pc = new RTCPeerConnection(rtcConfig);
            wireDiagnostics(pc, 'join');

            pc.ondatachannel = (e) => {
                dataChannel = e.channel;
                wireDataChannel(dataChannel);
            };

            const callerCandidates = collection(db, 'secretChatSignaling', roomCode, 'callerCandidates');
            const calleeCandidates = collection(db, 'secretChatSignaling', roomCode, 'calleeCandidates');

            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(calleeCandidates, e.candidate.toJSON());
            };

            await pc.setRemoteDescription(new RTCSessionDescription(roomSnap.data().offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await setDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } }, { merge: true });

            onSnapshot(callerCandidates, (snap) => {
                snap.docChanges().forEach((change) => {
                    if (change.type === 'added') {
                        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
                    }
                });
            });
        };

        document.getElementById('message-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({ type: 'chat', sender: myName, text }));
                appendMessage(myName, text, true);
                input.value = '';
            }
        };
    </script>
</body>
</html>
