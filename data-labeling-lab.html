  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --surface3: #222233;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text2: #a0a0b8;
      --text3: #6a6a82;
      --amber: #f59e0b;
      --amber-dim: #b47708;
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.15);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.15);
      --pink: #f472b6;
      --cyan: #22d3ee;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== PHASE CONTAINER ===== */
    .app-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .lab-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    .lab-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--amber);
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    .lab-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .lab-subtitle {
      font-size: 15px;
      color: var(--text2);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== PHASE INDICATORS ===== */
    .phase-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .phase-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      background: var(--surface2);
      color: var(--text3);
      border: 2px solid var(--border);
      transition: all 0.3s ease;
    }

    .phase-dot.active {
      background: var(--amber);
      color: #000;
      border-color: var(--amber);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }

    .phase-dot.complete {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    .phase-dot.clickable {
      cursor: pointer;
    }

    .phase-dot.clickable:hover {
      box-shadow: 0 0 16px rgba(34, 197, 94, 0.4);
      transform: scale(1.1);
    }

    .phase-line {
      width: 40px;
      height: 2px;
      background: var(--border);
      transition: background 0.3s ease;
    }

    .phase-line.complete {
      background: var(--green);
    }

    /* ===== INTRO SCREEN ===== */
    .intro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .intro-card h2 {
      font-size: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .intro-card p {
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .intro-card strong {
      color: var(--amber);
    }

    .rules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .rule-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }

    .rule-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .rule-label {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .rule-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--amber);
    }

    .start-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--amber);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .start-btn:hover {
      background: #fbbf24;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
    }

    /* ===== TIMER BAR ===== */
    .timer-bar-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      margin: -24px -20px 24px -20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .timer-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .timer-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      min-width: 80px;
    }

    .timer-clock.warning { color: var(--amber); }
    .timer-clock.critical { color: var(--red); animation: pulse-red 1s infinite; }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .timer-progress {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 16px;
    }

    .timer-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 1s linear, background 0.3s ease;
    }

    .timer-fill.warning { background: var(--amber); }
    .timer-fill.critical { background: var(--red); }

    .labels-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text2);
    }

    .labels-count span {
      color: var(--amber);
      font-weight: 700;
    }

    /* ===== LABELING CARD ===== */
    .label-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .label-card-header {
      background: var(--surface2);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .card-category {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text3);
    }

    .card-progress {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text3);
    }

    .card-progress span {
      color: var(--amber);
    }

    .label-content {
      padding: 28px 24px;
    }

    .label-content-text {
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      padding: 20px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--purple);
    }

    .label-content img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }

    .label-options {
      padding: 0 24px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .label-btn {
      flex: 1;
      min-width: 120px;
      padding: 14px 20px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .label-btn:hover {
      border-color: var(--amber);
      background: rgba(245, 158, 11, 0.08);
      transform: translateY(-2px);
    }

    .label-btn:active {
      transform: translateY(0);
    }

    .label-btn.selected {
      border-color: var(--amber);
      background: rgba(245, 158, 11, 0.15);
      color: var(--amber);
    }

    .skip-btn {
      display: block;
      margin: 0 auto;
      padding: 8px 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .skip-btn:hover {
      border-color: var(--text3);
      color: var(--text2);
    }

    /* ===== RESULTS PHASE ===== */
    .results-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .results-section h2 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
    }

    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.blue { color: var(--blue); }
    .stat-value.purple { color: var(--purple); }

    .stat-label {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== AGREEMENT HEATMAP ===== */
    .heatmap-grid {
      display: grid;
      gap: 6px;
      margin-bottom: 20px;
    }

    .heatmap-row {
      display: grid;
      grid-template-columns: 2fr repeat(var(--cols), 1fr);
      gap: 4px;
      align-items: center;
    }

    .heatmap-item-label {
      font-size: 12px;
      color: var(--text2);
      padding: 6px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .heatmap-cell {
      padding: 8px 4px;
      text-align: center;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: default;
      position: relative;
    }

    .heatmap-cell:hover {
      transform: scale(1.1);
      z-index: 2;
    }

    .heatmap-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      text-align: center;
      padding: 4px;
    }

    /* ===== DISAGREEMENT SPOTLIGHT ===== */
    .disagreement-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 12px;
    }

    .disagreement-item .item-text {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 12px;
      padding: 12px;
      background: var(--surface);
      border-radius: 6px;
      border-left: 3px solid var(--red);
    }

    .vote-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .vote-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vote-bar-label {
      font-size: 12px;
      color: var(--text2);
      min-width: 80px;
      text-align: right;
    }

    .vote-bar-track {
      flex: 1;
      height: 20px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }

    .vote-bar-fill {
      height: 100%;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #000;
      min-width: 30px;
      transition: width 0.8s ease;
    }

    /* ===== MODEL IMPACT SIMULATION ===== */
    .model-sim {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .model-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
    }

    .model-card h4 {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .model-card .model-desc {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .model-accuracy {
      font-family: 'JetBrains Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .model-bar {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .model-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease;
    }

    /* ===== REFLECTION PHASE ===== */
    .reflection-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .reflection-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reflection-prompt {
      color: var(--text2);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .reflection-textarea {
      width: 100%;
      min-height: 100px;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.2s ease;
    }

    .reflection-textarea:focus {
      outline: none;
      border-color: var(--amber);
    }

    .big-reveal {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.08), rgba(167, 139, 250, 0.08));
      border: 1px solid var(--amber-dim);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      text-align: center;
    }

    .big-reveal h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .big-reveal p {
      color: var(--text2);
      line-height: 1.7;
      max-width: 650px;
      margin: 0 auto;
    }

    .fact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .fact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: left;
    }

    .fact-card .fact-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .fact-card .fact-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .next-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 24px auto 0;
      padding: 14px;
      background: var(--amber);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .next-btn:hover {
      background: #fbbf24;
      transform: translateY(-1px);
    }

    .next-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== YOUR LABEL TAG ===== */
    .your-label-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--amber);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== LOADING / WAITING ===== */
    .waiting-screen {
      text-align: center;
      padding: 60px 20px;
    }

    .waiting-screen h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .waiting-screen p {
      color: var(--text2);
      font-size: 15px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--surface2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .app-container { padding: 16px 12px; }
      .lab-title { font-size: 24px; }
      .timer-clock { font-size: 22px; }
      .label-options { flex-direction: column; }
      .label-btn { min-width: 100%; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .model-sim { grid-template-columns: 1fr; }
    }

    /* ===== FADE TRANSITIONS ===== */
    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    // ═══════════════════════════════════════════════════════════════

      {

    // Shuffle helper (seeded by student so each gets same order per session)
    function shuffleArray(arr, seed) {
      const shuffled = [...arr];
      let s = seed || 1;
      for (let i = shuffled.length - 1; i > 0; i--) {
        s = (s * 16807) % 2147483647;
        const j = s % (i + 1);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // ═══════════════════════════════════════════════════════════════
    // SIMULATED CLASS DATA (used when no Firebase / standalone mode)
    // ═══════════════════════════════════════════════════════════════
    function generateSimulatedClassData(studentLabels) {
      const simStudents = 24;
      const allLabels = {};

      LABELING_ITEMS.forEach(item => {
        allLabels[item.id] = {};
        const opts = item.options;

        // Create realistic distributions — controversial items get spread out
        const isControversial = ["s1","s2","s3","s5","s6","s8","s10","s11","s13","s14","s15","s16","s18","s19","s21","s24","s25","s26","s29","s30","s33","s34","s36","s39","s40","s42","s43","s44","s46","s47","m1","m2","m3","m4","m6","m8","m9","m10","m12","m13","m14","m16","m18","m21","m22","m23","m25","m27","m28","m29","m32","m33","e1","e2","e3","e5","e6","e8","e9","e11","e13","e15","e16","e17","e18","e21","e22","e23","e24","e26","e27","e29","e30","e32","e34","e35"].includes(item.id);

        for (let s = 0; s < simStudents; s++) {
          if (isControversial) {
            // Spread across options with some clustering
            const r = Math.random();
            if (r < 0.35) allLabels[item.id][`sim_${s}`] = opts[0];
            else if (r < 0.65) allLabels[item.id][`sim_${s}`] = opts[1];
            else if (r < 0.85) allLabels[item.id][`sim_${s}`] = opts[2];
            else allLabels[item.id][`sim_${s}`] = opts[opts.length - 1];
          } else {
            // Strong majority on one option
            const r = Math.random();
            if (r < 0.7) allLabels[item.id][`sim_${s}`] = opts[0];
            else if (r < 0.9) allLabels[item.id][`sim_${s}`] = opts[1];
            else allLabels[item.id][`sim_${s}`] = opts[Math.floor(Math.random() * opts.length)];
          }
        }

        // Add student's own label
        if (studentLabels[item.id]) {
          allLabels[item.id]["you"] = studentLabels[item.id];
        }
      });

      return allLabels;
    }

    function computeAgreementStats(classData) {
      const results = {};

      LABELING_ITEMS.forEach(item => {
        const labels = classData[item.id] || {};
        const counts = {};
        let total = 0;

        Object.values(labels).forEach(label => {
          counts[label] = (counts[label] || 0) + 1;
          total++;
        });

        const maxCount = Math.max(...Object.values(counts), 0);
        const agreement = total > 0 ? maxCount / total : 0;
        const majority = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || null;

        results[item.id] = {
          counts,
          total,
          agreement,
          majority,
          studentLabel: labels["you"] || null,
          studentMatchesMajority: labels["you"] === majority
        };
      });

      return results;
    }

                setLabels(d.savedLabels);

                setResponses(d.reflections);
              }

              if (d.submitted) {
                // Fully submitted — go to reflection in read-only
                setSubmitted(true);
                setLabelingDone(true);
                setTimeLeft(1500 - (d.timeUsed || 0));
                // Regenerate simulated data for results view
                const simData = generateSimulatedClassData(d.savedLabels || {});
                setClassData(simData);
                setAgreementStats(computeAgreementStats(simData));
                maxPhaseRef.current = 3;
                setPhase("reflection");
              } else if (d.savedLabels && d.labelingDone) {
                // Finished labeling but hasn't submitted reflections
                setLabelingDone(true);
                setTimeLeft(1500 - (d.timeUsed || 0));
                const simData = generateSimulatedClassData(d.savedLabels);
                setClassData(simData);
                setAgreementStats(computeAgreementStats(simData));
                maxPhaseRef.current = d.reflections?.r1 ? 3 : 2;
                setPhase(d.reflections?.r1 ? "reflection" : "results");

                // Mid-labeling — restore to labeling phase
                setTimeLeft(1500 - (d.timeUsed || 0));
                setCurrentIndex(Object.keys(d.savedLabels).length);
                maxPhaseRef.current = 1;
                setPhase("labeling");
              }
              // else: no meaningful data saved, start from intro
            }

          .finally(() => setDataLoading(false));
      }, [currentUser]);

      const totalItems = items.length;
      const labeledCount = Object.keys(labels).length;

      // Timer logic
      useEffect(() => {
        if (phase === "labeling" && !labelingDone && timeLeft > 0) {

                clearInterval(timerRef.current);
                return 0;

              return t - 1;
            });

                  </div>

                  <div className="label-options">
                    {items[currentIndex].options.map(opt => (
                      <button
                        key={opt}
                        className={`label-btn ${labels[items[currentIndex].id] === opt ? 'selected' : ''}`}
                        onClick={() => selectLabel(items[currentIndex].id, opt)}
                      >
                        {opt}
                      </button>
                    ))}
                  </div>

                  <div style={{padding: '0 24px 16px', textAlign: 'center'}}>
                    <button className="skip-btn" onClick={skipItem}>
                      Skip this one →
                    </button>
                  </div>
                </div>
              ) : (
                <div className="intro-card" style={{textAlign: 'center'}}>
                  <h2>✅ You've seen all the items!</h2>
                  <p>You labeled <strong>{labeledCount}</strong> out of {totalItems} items.</p>
                  <p>Total earned: <strong>${(labeledCount * 0.02).toFixed(2)}</strong></p>
                  <button className="next-btn" onClick={finishLabeling} style={{marginTop: 20}}>
                    See How the Class Did →
                  </button>
                </div>
              )}

              {/* Early finish button */}
              {currentIndex < totalItems && labeledCount >= 5 && (
                <button
                  className="next-btn"
                  onClick={finishLabeling}
                  style={{background: 'var(--surface2)', color: 'var(--text2)', border: '1px solid var(--border)'}}
                >
                  Done labeling — see results ({labeledCount}/{totalItems} completed)
                </button>
              )}
            </div>
          )}

          {/* ===== PHASE 2: READ-ONLY REVIEW ===== */}
          {phase === "labeling" && labelingDone && (
            <div className="fade-in">
              <div className="intro-card" style={{textAlign: 'center', marginBottom: 16}}>
                <h2>📋 Your Labels (Read-Only)</h2>
                <p style={{color: 'var(--text2)', fontSize: '14px'}}>
                  You labeled <strong>{labeledCount}</strong> of {totalItems} items.
                  Use the phase dots above to navigate back to Results or Reflection.
                </p>
              </div>

              <div style={{display: 'flex', flexDirection: 'column', gap: 10}}>
                {items.map((item, idx) => {
                  const studentLabel = labels[item.id];
                  if (!studentLabel) return null;
                  return (
                    <div key={item.id} className="label-card" style={{padding: '14px 20px'}}>
                      <div className="label-card-header" style={{marginBottom: 8}}>
                        <div className="card-category">{item.category}</div>
                        <div className="card-progress" style={{fontSize: 11}}>#{idx + 1}</div>
                      </div>
                      <div style={{fontSize: 14, color: 'var(--text)', lineHeight: 1.5, marginBottom: 10}}>
                        {item.content}
                      </div>
                      <div className="label-options">
                        {item.options.map(opt => (
                          <div
                            key={opt}
                            className={`label-btn ${studentLabel === opt ? 'selected' : ''}`}
                            style={{cursor: 'default', pointerEvents: 'none', opacity: studentLabel === opt ? 1 : 0.35}}
                          >
                            {opt}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}

                {/* Show skipped items */}
                {items.filter(item => !labels[item.id]).length > 0 && (
                  <div className="intro-card" style={{textAlign: 'center', marginTop: 8}}>
                    <p style={{color: 'var(--text3)', fontSize: '13px'}}>
                      {items.filter(item => !labels[item.id]).length} items were skipped
                    </p>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ===== PHASE 3: RESULTS ===== */}
          {phase === "results" && agreementStats && (
            <ResultsPhase
              labels={labels}
              items={items}
              stats={agreementStats}
              classData={classData}
              labeledCount={labeledCount}
              totalItems={totalItems}
              onNext={() => setPhase("reflection")}
            />
          )}

          {/* ===== PHASE 4: REFLECTION ===== */}
          {phase === "reflection" && (
            <ReflectionPhase
              labels={labels}
              stats={agreementStats}
              labeledCount={labeledCount}
              totalItems={totalItems}
              timeLeft={timeLeft}
              currentUser={currentUser}
              submitted={submitted}
              setSubmitted={setSubmitted}
              responses={responses}
              setResponses={setResponses}
            />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // RESULTS PHASE COMPONENT
    // ═══════════════════════════════════════════════════════════════
    function ResultsPhase({ labels, items, stats, classData, labeledCount, totalItems, onNext }) {
      const [showModel, setShowModel] = useState(false);

      // Find most controversial items
      const controversialItems = LABELING_ITEMS
        .filter(item => stats[item.id] && stats[item.id].agreement < 0.55)
        .sort((a, b) => stats[a.id].agreement - stats[b.id].agreement)
        .slice(0, 4);

      // Count how many times student matched majority
      const matchCount = Object.entries(labels).filter(
        ([id]) => stats[id]?.studentMatchesMajority
      ).length;

      // Simulated model metrics
      const majorityAccuracy = 78;
      const studentAccuracy = Math.round(55 + (matchCount / Math.max(labeledCount, 1)) * 30);
      const randomHalfAccuracy = Math.round(45 + Math.random() * 15);

      const colorForAgreement = (pct) => {
        if (pct >= 0.75) return 'var(--green)';
        if (pct >= 0.55) return 'var(--amber)';
        return 'var(--red)';
      };

      return (
        <div className="fade-in">
          {/* Summary Stats */}
          <div className="results-section">
            <h2>📊 Your Labeling Session</h2>
            <div className="stats-row">
              <div className="stat-card">
                <div className="stat-value amber">{labeledCount}</div>
                <div className="stat-label">Items Labeled</div>
              </div>
              <div className="stat-card">
                <div className="stat-value green">${(labeledCount * 0.02).toFixed(2)}</div>
                <div className="stat-label">Total "Earned"</div>
              </div>
              <div className="stat-card">
                <div className="stat-value blue">{matchCount}/{labeledCount}</div>
                <div className="stat-label">Matched Majority</div>
              </div>
              <div className="stat-card">
                <div className="stat-value purple">
                  {labeledCount > 0 ? Math.round((matchCount / labeledCount) * 100) : 0}%
                </div>
                <div className="stat-label">Agreement Rate</div>
              </div>
            </div>
          </div>

          {/* Agreement Heatmap */}
          <div className="results-section">
            <h2>🗺️ Class Agreement Heatmap</h2>
            <p style={{color: 'var(--text2)', fontSize: '14px', marginBottom: '16px'}}>
              Each row is one item you labeled. The cells show what percentage of the class chose each option.
              <span style={{color: 'var(--green)'}}> Green = high agreement</span>,
              <span style={{color: 'var(--amber)'}}> Yellow = split</span>,
              <span style={{color: 'var(--red)'}}> Red = major disagreement</span>.
            </p>

            <div className="heatmap-grid">
              {LABELING_ITEMS.slice(0, 12).map(item => {
                const s = stats[item.id];
                if (!s) return null;
                const opts = item.options;

                return (
                  <div key={item.id} className="heatmap-row" style={{'--cols': opts.length}}>
                    <div className="heatmap-item-label" title={item.content}>
                      {item.content.slice(0, 40)}...
                    </div>
                    {opts.map(opt => {
                      const count = s.counts[opt] || 0;
                      const pct = s.total > 0 ? count / s.total : 0;
                      const isYours = labels[item.id] === opt;
                      return (
                        <div
                          key={opt}
                          className="heatmap-cell"
                          style={{
                            background: `${colorForAgreement(pct)}${Math.round(pct * 60 + 15).toString(16)}`,
                            color: pct > 0.4 ? '#000' : 'var(--text2)'
                          }}
                          title={`${opt}: ${Math.round(pct * 100)}% of class${isYours ? ' (your choice)' : ''}`}
                        >
                          {Math.round(pct * 100)}%
                          {isYours && <span className="your-label-tag">YOU</span>}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Most Controversial Items */}
          <div className="results-section">
            <h2>🔥 Biggest Disagreements</h2>
            <p style={{color: 'var(--text2)', fontSize: '14px', marginBottom: '16px'}}>
              These items had the most split opinions. If these labels were used to train a model, 
              <strong style={{color: 'var(--amber)'}}> which answer would be "correct"?</strong>
            </p>

            {controversialItems.map(item => {
              const s = stats[item.id];
              const opts = item.options;
              const barColors = ['var(--blue)', 'var(--purple)', 'var(--pink)', 'var(--cyan)'];

              return (
                <div key={item.id} className="disagreement-item">
                  <div className="item-text">{item.content}</div>
                  <div className="vote-bars">
                    {opts.map((opt, i) => {
                      const count = s.counts[opt] || 0;
                      const pct = s.total > 0 ? (count / s.total) * 100 : 0;
                      const isYours = labels[item.id] === opt;
                      return (
                        <div key={opt} className="vote-bar-row">
                          <div className="vote-bar-label">
                            {opt} {isYours && '👈'}
                          </div>
                          <div className="vote-bar-track">
                            <div
                              className="vote-bar-fill"
                              style={{
                                width: `${pct}%`,
                                background: barColors[i % barColors.length]
                              }}
                            >
                              {pct > 12 ? `${Math.round(pct)}%` : ''}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {item.note && (
                    <p style={{fontSize: '12px', color: 'var(--text3)', marginTop: '10px', fontStyle: 'italic'}}>
                      💡 {item.note}
                    </p>
                  )}
                </div>
              );
            })}
          </div>

          {/* Model Impact Simulation */}
          <div className="results-section">
            <h2>🤖 How Labels Become a Model</h2>
            <p style={{color: 'var(--text2)', fontSize: '14px', marginBottom: '8px'}}>
              Imagine three different AI models were trained using different sets of labels from your class. 
              Look at how the "accuracy" changes depending on <em>whose labels</em> were used as the answer key.
            </p>

            <div className="model-sim">
              <div className="model-card">
                <h4>Majority Vote</h4>
                <div className="model-desc">Trained on the most popular label for each item</div>
                <div className="model-accuracy" style={{color: 'var(--green)'}}>{majorityAccuracy}%</div>
                <div className="model-bar">
                  <div className="model-bar-fill" style={{width: `${majorityAccuracy}%`, background: 'var(--green)'}} />
                </div>
              </div>

              <div className="model-card">
                <h4>Your Labels Only</h4>
                <div className="model-desc">Trained exclusively on your personal judgments</div>
                <div className="model-accuracy" style={{color: 'var(--amber)'}}>{studentAccuracy}%</div>
                <div className="model-bar">
                  <div className="model-bar-fill" style={{width: `${studentAccuracy}%`, background: 'var(--amber)'}} />
                </div>
              </div>

              <div className="model-card">
                <h4>Random Half</h4>
                <div className="model-desc">Trained on labels from a random 50% of the class</div>
                <div className="model-accuracy" style={{color: 'var(--red)'}}>{randomHalfAccuracy}%</div>
                <div className="model-bar">
                  <div className="model-bar-fill" style={{width: `${randomHalfAccuracy}%`, background: 'var(--red)'}} />
                </div>
              </div>
            </div>

            <p style={{color: 'var(--text3)', fontSize: '12px', marginTop: '16px', textAlign: 'center', fontStyle: 'italic'}}>
              Note: These accuracy numbers are simulated to illustrate the concept. 
              Real model performance depends on many more factors.
            </p>
          </div>

          <button className="next-btn" onClick={onNext}>
            Continue to Reflection →
          </button>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // REFLECTION PHASE COMPONENT
    // ═══════════════════════════════════════════════════════════════
    function ReflectionPhase({ labels, stats, labeledCount, totalItems, timeLeft, currentUser, submitted, setSubmitted, responses, setResponses }) {
      const [saving, setSaving] = useState(false);
      const [saveError, setSaveError] = useState(null);
      const draftSaveRef = useRef(null);

      const updateResponse = (id, value) => {
        setResponses(prev => ({ ...prev, [id]: value }));
      };

      // Debounced auto-save reflections as student types (3s after last keystroke)
      useEffect(() => {
        if (submitted || !currentUser) return;
        clearTimeout(draftSaveRef.current);
        const hasContent = responses.r1 || responses.r2 || responses.r3;
        if (!hasContent) return;
        draftSaveRef.current = setTimeout(() => {
          firebaseDb.collection("dataLabelingLab").doc(currentUser.uid).set({
            reflections: {
              r1: responses.r1 || "",
              r2: responses.r2 || "",
              r3: responses.r3 || ""
            }
          }, { merge: true }).catch(err => console.warn("Reflection draft save failed:", err));
        }, 3000);
        return () => clearTimeout(draftSaveRef.current);
      }, [responses, submitted, currentUser]);

      const allAnswered = responses.r1 && responses.r2 && responses.r3;

      // Compute accuracy: % of student labels matching simulated majority
      const matchCount = Object.entries(labels).filter(
        ([id]) => stats[id]?.studentMatchesMajority
      ).length;
      const accuracy = labeledCount > 0 ? Math.round((matchCount / labeledCount) * 100) : 0;

      const handleSubmit = async () => {
        setSaving(true);
        setSaveError(null);
        clearTimeout(draftSaveRef.current);

        const wordCount = [responses.r1, responses.r2, responses.r3]
          .filter(Boolean)
          .join(' ')
          .split(/\s+/)
          .filter(w => w.length > 0).length;

        try {
          await firebaseDb.collection("dataLabelingLab").doc(currentUser.uid).set({
            uid: currentUser.uid,
            displayName: currentUser.displayName || "",
            email: currentUser.email || "",
            photoURL: currentUser.photoURL || "",
            courseId: "paps",
            submitted: true,
            completedAt: firebase.firestore.FieldValue.serverTimestamp(),
            accuracy: accuracy,
            labeledCount: labeledCount,
            totalItems: totalItems,
            timeUsed: 1500 - timeLeft,
            reflectionWordCount: wordCount,
            reflections: {
              r1: responses.r1 || "",
              r2: responses.r2 || "",
              r3: responses.r3 || ""
            }
          }, { merge: true });

          setSubmitted(true);
        } catch (err) {
          console.error("Failed to save:", err);
          setSaveError("Failed to save your work. Please try again.");
        }
        setSaving(false);
      };

      return (
        <div className="fade-in">
          {/* The Big Reveal */}
          <div className="big-reveal">
            <h2>🏭 The Real "Sweatshop"</h2>
            <p>
              You just experienced a simplified version of what millions of workers do every day.
              The AI systems you use — from ChatGPT to TikTok's algorithm to Instagram's content
              filters — were all built on labels created by real people, often under similar time pressure.
            </p>
          </div>

          <div className="fact-grid">
            <div className="fact-card">
              <div className="fact-label">💰 Real Pay Rates</div>
              <div className="fact-text">
                Basic data labelers on platforms like Amazon Mechanical Turk earn $2–6/hour.
                Workers in Kenya who labeled training data for ChatGPT reported earning about $2/hour.
                Meanwhile, specialized AI trainers with expertise in law, medicine, or coding earn
                $30–50+/hour on the same platforms doing the same type of work — just with harder questions.
              </div>
            </div>
            <div className="fact-card">
              <div className="fact-label">🔁 RLHF</div>
              <div className="fact-text">
                "Reinforcement Learning from Human Feedback" — the technique used to make ChatGPT
                conversational — required thousands of human labelers to rate AI responses as
                "good" or "bad."
              </div>
            </div>
            <div className="fact-card">
              <div className="fact-label">⚖️ The Subjectivity Problem</div>
              <div className="fact-text">
                Your class couldn't agree on many items. Now imagine millions of labelers from
                different cultures, ages, and backgrounds. "Ground truth" is often just "whatever
                most people said."
              </div>
            </div>
            <div className="fact-card">
              <div className="fact-label">🌍 Who Labels Matters</div>
              <div className="fact-text">
                If labels come mostly from one demographic, the model learns that group's perspective
                as "correct." Content moderation models trained on US labelers may misjudge content
                from other cultures.
              </div>
            </div>
          </div>

          {/* Reflection Questions */}
          <div className="reflection-card">
            <h3>✍️ Reflection 1</h3>
            <div className="reflection-prompt">
              Which items were the hardest for you to label? What made them difficult?
              Think about whether the difficulty came from the content itself or from the
              categories you were given to choose from.
            </div>
            <textarea
              className="reflection-textarea"
              placeholder="Type your response..."
              value={responses.r1 || ''}
              onChange={(e) => updateResponse('r1', e.target.value)}
              disabled={submitted}
            />
          </div>

          <div className="reflection-card">
            <h3>✍️ Reflection 2</h3>
            <div className="reflection-prompt">
              Look back at the "Biggest Disagreements" section. For those items where the
              class was split, who gets to decide the "right" answer? What happens to the
              people whose perspective ends up in the minority?
            </div>
            <textarea
              className="reflection-textarea"
              placeholder="Type your response..."
              value={responses.r2 || ''}
              onChange={(e) => updateResponse('r2', e.target.value)}
              disabled={submitted}
            />
          </div>

          <div className="reflection-card">
            <h3>✍️ Reflection 3</h3>
            <div className="reflection-prompt">
              Imagine you're building a content moderation AI for a social media platform used
              by people around the world. Based on what you experienced today, what concerns
              would you have about how the training data gets labeled? What would you do
              differently than current companies?
            </div>
            <textarea
              className="reflection-textarea"
              placeholder="Type your response..."
              value={responses.r3 || ''}
              onChange={(e) => updateResponse('r3', e.target.value)}
              disabled={submitted}
            />
          </div>

          {saveError && (
            <p style={{color: 'var(--red)', textAlign: 'center', fontSize: '14px', margin: '12px 0'}}>
              {saveError}
            </p>
          )}

          {!submitted ? (
            <button
              className="next-btn"
              disabled={!allAnswered || saving}
              onClick={handleSubmit}
            >
              {saving ? 'Saving...' : allAnswered ? '✅ Submit Reflections' : 'Answer all 3 questions to submit'}
            </button>
          ) : (
            <div className="big-reveal" style={{marginTop: 20}}>
              <h2>🎉 Lab Complete!</h2>
              <p>
                You've experienced the hidden human labor behind AI, seen how disagreement
                creates uncertainty in "ground truth," and explored what it means when subjective
                human judgments become the foundation for machine learning.
              </p>
              <p style={{marginTop: 12, fontSize: '14px'}}>
                <strong>Key takeaway:</strong> AI doesn't discover truth — it learns the opinions
                of the people who labeled its training data.
              </p>
              <p style={{marginTop: 12, fontSize: '13px', color: 'var(--green)'}}>
                Your work has been saved. Your teacher will review it in the grading dashboard.
              </p>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
