<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fact-Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 18px; }
:root {
  --bg: #0c0c0e; --surface: #131316; --surface2: #1a1a1f;
  --border: #252528; --border2: #303036;
  --text: #eeeeef; --muted: #7a7a88; --dim: #505060;
  --case-a: #e63946; --case-b: #f4823a; --case-c: #9b5fe0; --case-d: #3a86ff;
  --green: #22c55e; --green-glow: rgba(34,197,94,0.25);
  --red: #ef4444;
  --amber: #f59e0b;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --case-color: var(--case-a);
}
body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 1rem; line-height: 1.65; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }

/* ── TITLE SCREEN ── */
.screen { display: none; }
.screen.active { display: block; }
.title-screen { text-align: center; padding: 15vh 2rem 4rem; max-width: 700px; margin: 0 auto; }
.title-screen h1 { font-family: var(--font-display); font-size: 4rem; letter-spacing: 0.04em; margin-bottom: 0.3rem; color: #fff; }
.title-screen .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6; font-weight: 300; }
.article-select { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
.article-btn { padding: 12px 28px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--muted); font-family: var(--font-mono); font-weight: 500; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
.article-btn .btn-letter { font-family: var(--font-display); font-size: 1.3rem; line-height: 1; }
.article-btn[data-key="a"] .btn-letter { color: var(--case-a); }
.article-btn[data-key="b"] .btn-letter { color: var(--case-b); }
.article-btn[data-key="c"] .btn-letter { color: var(--case-c); }
.article-btn[data-key="d"] .btn-letter { color: var(--case-d); }
.article-btn:hover { border-color: var(--text); color: var(--text); }
.article-btn.selected { border-color: var(--case-color); color: var(--text); background: var(--surface2); }
.start-btn { padding: 14px 44px; border: none; border-radius: 8px; background: var(--muted); color: var(--bg); font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
.start-btn:disabled { opacity: 0.3; cursor: default; }
.start-btn:not(:disabled) { background: var(--case-color); }
.start-btn:not(:disabled):hover { transform: scale(1.03); }

/* ── GAME SCREEN ── */
.game-wrap { max-width: 900px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }

/* Hero */
.case-hero { margin-bottom: 2.5rem; position: relative; }
.case-number-bg { font-family: var(--font-display); font-size: 12rem; line-height: 1; position: absolute; right: -1rem; top: -2rem; opacity: 0.04; pointer-events: none; user-select: none; color: var(--case-color); }
.case-eyebrow { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.case-id { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 3px; font-weight: 500; background: rgba(255,255,255,0.06); color: var(--case-color); }
.case-category { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.case-hero h1 { font-family: var(--font-display); font-size: 3.2rem; line-height: 1.0; letter-spacing: 0.03em; color: #fff; margin-bottom: 0; }

/* Stat bar */
.stat-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border2); border-radius: 10px; overflow: hidden; margin-bottom: 2rem; border: 1px solid var(--border2); }
.stat { background: var(--surface); padding: 1.15rem 1.15rem 0.9rem; position: relative; overflow: hidden; }
.stat::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--case-color); opacity: 0; transition: opacity 0.3s; }
.stat:hover::after { opacity: 1; }
.stat-value { font-family: var(--font-display); font-size: 2.2rem; line-height: 1; margin-bottom: 0.3rem; letter-spacing: 0.02em; color: var(--case-color); }
.stat-label { font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; line-height: 1.4; }

/* Counter */
.counter-bar { text-align: center; margin-bottom: 1.5rem; }
.counter-num { font-family: var(--font-display); font-size: 4rem; line-height: 1; color: var(--case-color); }
.counter-label { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }

/* Completion banner */
.completion-banner { display: none; text-align: center; padding: 1.5rem 1.5rem 1.25rem; background: var(--surface); border: 1px solid rgba(34,197,94,0.3); border-radius: 10px; margin-bottom: 1.5rem; }
.completion-banner.visible { display: block; animation: bannerIn 0.5s ease forwards; }
@keyframes bannerIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.completion-banner .banner-title { font-family: var(--font-display); font-size: 2rem; letter-spacing: 0.04em; color: var(--green); margin-bottom: 0.25rem; }
.completion-banner .banner-sub { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; }

/* Instructions callout */
.instructions-callout { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
.instructions-callout .inst-title { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.instructions-callout .inst-steps { display: flex; flex-direction: column; gap: 0.5rem; }
.instructions-callout .inst-step { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: #c0c0c8; font-weight: 300; }
.instructions-callout .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.instructions-callout .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.instructions-callout .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
.instructions-callout .dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

/* Article card (parchment) */
.article-card { background: #f0ebe0; color: #1a1a1a; border-radius: 6px; padding: 2rem 2.2rem; font-size: 1.0rem; line-height: 1.75; box-shadow: 0 2px 20px rgba(0,0,0,0.4); margin-bottom: 1.5rem; }
.article-card .byline { font-family: var(--font-mono); font-size: 0.72rem; color: #666; margin-bottom: 1.2rem; letter-spacing: 0.04em; }

.paragraph { margin-bottom: 1rem; }
.paragraph:last-child { margin-bottom: 0; }

.sentence {
  display: inline;
  cursor: pointer;
  padding: 2px 3px;
  border-radius: 3px;
  transition: background 0.25s, color 0.25s, box-shadow 0.25s;
  -webkit-user-select: none;
  user-select: none;
  color: #1a1a1a;
}
.sentence:hover { background: rgba(0,0,0,0.06); }

/* Found misconception — bright green, permanent */
.sentence.correct {
  background: rgba(34,197,94,0.3);
  color: #065f28;
  box-shadow: 0 0 8px rgba(34,197,94,0.35);
  cursor: default;
}

/* Wrong click — red flash */
.sentence.wrong { animation: flash-red 0.6s ease forwards; }
@keyframes flash-red {
  0% { background: rgba(239,68,68,0.35); color: #991b1b; }
  100% { background: transparent; color: #1a1a1a; }
}

/* Hint: paragraph level — bright amber background */
.sentence.hint-para {
  background: rgba(245,158,11,0.35);
}

/* Hint: sentence level — even brighter with amber text + pulsing glow */
.sentence.hint-sentence {
  background: rgba(245,158,11,0.5);
  color: #92400e;
  box-shadow: 0 0 10px rgba(245,158,11,0.4);
  animation: hint-pulse 1.5s ease-in-out infinite;
}
@keyframes hint-pulse {
  0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.3); }
  50% { box-shadow: 0 0 18px rgba(245,158,11,0.6); }
}

/* Hint bar */
.hint-bar { display: flex; gap: 12px; align-items: center; padding: 1rem 0 0; }
.hint-btn { padding: 8px 20px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; }
.hint-btn:hover { border-color: var(--amber); color: var(--amber); }
.hint-btn:disabled { opacity: 0.3; cursor: default; }
.hint-text { font-size: 0.78rem; color: var(--muted); font-family: var(--font-mono); }

/* ── Responsive ── */
@media (max-width: 700px) {
  .game-wrap { padding: 2rem 1rem 4rem; }
  .case-hero h1 { font-size: 2.2rem; }
  .case-number-bg { font-size: 8rem; }
  .article-card { padding: 1.2rem 1.4rem; font-size: 0.92rem; }
  .stat-bar { grid-template-columns: repeat(2, 1fr); }
  .counter-num { font-size: 3rem; }
  .title-screen h1 { font-size: 2.8rem; }
}
@media (prefers-reduced-motion: reduce) {
  .sentence.wrong { animation: none; background: rgba(239,68,68,0.3); }
  .sentence.hint-sentence { animation: none; }
  .completion-banner.visible { animation: none; }
}
</style>
</head>
<body>

<div class="screen title-screen active" id="title-screen">
  <h1>FACT-CHECKER</h1>
  <p class="sub">Read the article. Click on sentences that contain misconceptions about AI. Can you find them all?</p>
  <div class="article-select" id="article-select"></div>
  <button class="start-btn" id="start-btn" disabled>BEGIN INVESTIGATION</button>
</div>

<div class="screen" id="game-screen">

    <div class="stat-bar" id="stat-bar"></div>

    <div class="completion-banner" id="completion-banner">

      <div class="banner-sub" id="banner-sub"></div>
    </div>

    <div class="instructions-callout">
      <div class="inst-title">How to Play</div>
      <div class="inst-steps">
        <span class="inst-step">Click any sentence you think is a misconception</span>
        <span class="inst-step"><span class="dot green"></span> Misconception found</span>
        <span class="inst-step"><span class="dot red"></span> That sentence is fine</span>
        <span class="inst-step"><span class="dot amber"></span> Hint available below</span>
      </div>
    </div>

    <div class="article-card">
      <div class="byline" id="article-byline"></div>
      <div id="article-body"></div>
    </div>

    <div class="hint-bar" id="hint-bar">
      <button class="hint-btn" id="hint-btn">Need a hint?</button>
      <span class="hint-text" id="hint-text"></span>
    </div>
  </div>
</div>

let totalMisconceptions = 0;
let hintLevel = 0;
let scoreSent = false;
let currentArticleId = null;

// ═══════════════════════════════════════════
// TITLE SCREEN
// ═══════════════════════════════════════════
const selectDiv = document.getElementById('article-select');
const startBtn = document.getElementById('start-btn');

function setCaseColor(key) {
  document.documentElement.style.setProperty('--case-color', CASE_COLORS[key]);
}

if (selectedArticle && ARTICLES[selectedArticle]) {
  startGame(selectedArticle);
} else {
  Object.keys(ARTICLES).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'article-btn';
    btn.dataset.key = key;
    btn.innerHTML = '<span class="btn-letter">' + key.toUpperCase() + '</span> ' + ARTICLES[key].category;
    btn.onclick = () => {
      document.querySelectorAll('.article-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedArticle = key;
      setCaseColor(key);
      startBtn.disabled = false;
    };
    selectDiv.appendChild(btn);
  });
  startBtn.onclick = () => { if (selectedArticle) startGame(selectedArticle); };
}

// ═══════════════════════════════════════════
// GAME
// ═══════════════════════════════════════════
function startGame(articleId) {
  const article = ARTICLES[articleId];
  if (!article) return;
  currentArticleId = articleId;
  setCaseColor(articleId);

  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');

  // Hero
  document.getElementById('hero-letter').textContent = articleId.toUpperCase();
  document.getElementById('case-id-badge').textContent = 'Article ' + articleId.toUpperCase();
  document.getElementById('case-category').textContent = 'Misconception Type: ' + ARTICLE_META[articleId].category;
  document.getElementById('article-title').textContent = article.title.replace(/^"|"$/g, '').toUpperCase();

  // Stat bar
  totalMisconceptions = 0;
  article.paragraphs.forEach(p => p.forEach(s => { if (s.m) totalMisconceptions++; }));

  const statBar = document.getElementById('stat-bar');
  const meta = JSON.parse(JSON.stringify(ARTICLE_META[articleId]));
  meta.stats[0].value = String(totalMisconceptions);
  meta.stats[3].value = 'INVESTIGATING';
  statBar.innerHTML = meta.stats.map(s =>
    '<div class="stat"><div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>'
  ).join('');

  // Counter
  updateCounter();

  // Byline
  document.getElementById('article-byline').textContent = article.byline;

  // Render article
  const body = document.getElementById('article-body');
  body.innerHTML = '';

  article.paragraphs.forEach((para, pi) => {
    const div = document.createElement('div');
    div.className = 'paragraph';
    div.dataset.para = pi;

    para.forEach((sent, si) => {
      const span = document.createElement('span');
      span.className = 'sentence';
      span.textContent = sent.text + ' ';
      span.dataset.para = pi;
      span.dataset.sent = si;
      span.dataset.m = sent.m ? '1' : '0';
      span.addEventListener('click', () => handleClick(span, pi, si, sent.m));
      div.appendChild(span);
    });

    body.appendChild(div);
  });

  // Hint
  hintLevel = 0;
  const hintBtn = document.getElementById('hint-btn');
  const hintText = document.getElementById('hint-text');
  hintText.textContent = '';
  hintBtn.disabled = false;
  hintBtn.onclick = () => giveHint(articleId);
}

function handleClick(span, pi, si, isMisconception) {
  const key = `${pi}-${si}`;
  if (found.has(key)) return;
  if (span.classList.contains('correct')) return;

  if (isMisconception) {
    found.add(key);
    span.classList.add('correct');
    clearHints();
    hintLevel = 0;
    document.getElementById('hint-text').textContent = '';
    updateCounter();

    if (found.size === totalMisconceptions) {
      setTimeout(showComplete, 600);
    }
  } else {
    span.classList.add('wrong');
    setTimeout(() => span.classList.remove('wrong'), 600);
  }
}

function updateCounter() {
  const remaining = totalMisconceptions - found.size;
  document.getElementById('remaining').textContent = remaining;
}

function clearHints() {
  document.querySelectorAll('.hint-para, .hint-sentence').forEach(el => {
    el.classList.remove('hint-para', 'hint-sentence');
  });
}

function giveHint(articleId) {
  const article = ARTICLES[articleId];
  const hintText = document.getElementById('hint-text');

  let target = null;
  for (let pi = 0; pi < article.paragraphs.length; pi++) {
    for (let si = 0; si < article.paragraphs[pi].length; si++) {
      if (article.paragraphs[pi][si].m && !found.has(`${pi}-${si}`)) {
        target = { pi, si };
        break;
      }
    }
    if (target) break;
  }
  if (!target) return;

  clearHints();

  if (hintLevel === 0) {
    const paraDiv = document.querySelector(`.paragraph[data-para="${target.pi}"]`);
    paraDiv.querySelectorAll('.sentence').forEach(s => {
      if (!s.classList.contains('correct')) s.classList.add('hint-para');
    });
    hintText.textContent = 'A misconception is somewhere in the highlighted paragraph.';
    hintLevel = 1;
  } else if (hintLevel === 1) {
    const sent = document.querySelector(`.sentence[data-para="${target.pi}"][data-sent="${target.si}"]`);
    sent.classList.add('hint-sentence');
    hintText.textContent = 'This sentence contains a misconception. Click it!';
    hintLevel = 2;
  } else {
    hintText.textContent = 'The highlighted sentence is a misconception \u2014 click it to confirm.';
  }
}

// ═══════════════════════════════════════════
// COMPLETION (in-place, no screen switch)
// ═══════════════════════════════════════════
function showComplete() {
  const score = found.size;
  const max = totalMisconceptions;

  // Show banner
  const banner = document.getElementById('completion-banner');
  banner.classList.add('visible');
  document.getElementById('banner-sub').textContent = score + '/' + max + ' misconceptions identified';

  // Hide hint bar
  document.getElementById('hint-bar').style.display = 'none';

  // Hide counter
  document.querySelector('.counter-bar').style.display = 'none';

  // Update stat bar status
  const statValues = document.querySelectorAll('.stat-value');
  if (statValues[3]) {
    statValues[3].textContent = 'COMPLETE';
    statValues[3].style.color = '#22c55e';
  }

  // Send score
  sendScore(score, max);
}

function sendScore(score, max) {
  if (scoreSent) return;
  scoreSent = true;
  window.parent.postMessage({ type: 'activityScore', score, maxScore: max }, '*');
}

// Partial score on unload
window.addEventListener('beforeunload', () => {
  if (!scoreSent && found.size > 0) {
    sendScore(found.size, totalMisconceptions);
  }
});
</script>
</body>
</html>
