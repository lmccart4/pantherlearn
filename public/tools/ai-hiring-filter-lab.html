<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiring Filter Lab</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #131d33;
    --panel-2: #0e1729;
    --line: #1f2a44;
    --text: #e5ecf7;
    --muted: #8ea0bf;
    --accept: #10b981;
    --reject: #ef4444;
    --amber: #f59e0b;
    --blue: #60a5fa;
    --violet: #a78bfa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; padding: 18px; }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.02em; }
  h2 { margin: 0 0 10px; font-size: 17px; color: var(--blue); }
  .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 14px; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .status-bar .progress { font-size: 13px; color: var(--muted); }
  .status-bar .score { font-size: 15px; font-weight: 700; color: var(--amber); }

  .rule-panel {
    background: var(--panel); border: 1px solid var(--line); border-left: 5px solid var(--amber);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 14px;
  }
  .rule-label { font-size: 11px; letter-spacing: 0.14em; color: var(--amber); text-transform: uppercase; font-weight: 700; }
  .rule-text { font-size: 18px; font-weight: 600; margin-top: 4px; line-height: 1.35; }
  .rule-hint { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.45; }

  .resume-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .resume {
    background: var(--panel-2); border: 1.5px solid var(--line); border-radius: 10px;
    padding: 11px 13px; display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.12s, opacity 0.2s;
  }
  .resume.disabled { opacity: 0.55; pointer-events: none; }
  .resume.result-correct { border-color: var(--accept); box-shadow: 0 0 0 1px rgba(16,185,129,0.3); }
  .resume.result-wrong { border-color: var(--reject); box-shadow: 0 0 0 1px rgba(239,68,68,0.3); }
  .resume-head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--line); padding-bottom: 5px; margin-bottom: 3px; }
  .resume-name { font-weight: 700; font-size: 15px; }
  .resume-num { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; font-weight: 700; }
  .resume-meta { color: var(--muted); font-size: 12px; }
  .resume-row { font-size: 12.5px; line-height: 1.35; }
  .resume-row strong { color: var(--blue); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 4px; }

  .choice-row { display: flex; gap: 8px; margin-top: 8px; }
  .choice-btn {
    flex: 1; padding: 7px 10px; border-radius: 7px; border: 1.5px solid var(--line);
    background: transparent; color: var(--text); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.12s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--blue); }
  .choice-btn.selected.accept { background: var(--accept); border-color: var(--accept); color: #04160e; }
  .choice-btn.selected.reject { background: var(--reject); border-color: var(--reject); color: #1a0505; }
  .choice-btn:disabled { cursor: default; }

  .feedback-line { margin-top: 6px; font-size: 12px; line-height: 1.4; }
  .feedback-line.ok { color: var(--accept); }
  .feedback-line.no { color: var(--reject); }

  .submit-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
  .submit-btn {
    background: var(--amber); color: #1a1205; font-weight: 700; border: none;
    padding: 11px 22px; border-radius: 9px; font-size: 14.5px; cursor: pointer;
    letter-spacing: 0.02em;
  }
  .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .submit-btn.next { background: var(--blue); color: #041020; }
  .submit-btn.finish { background: var(--violet); color: #110624; }

  .round-feedback {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 14px;
  }
  .round-feedback h3 { margin: 0 0 6px; font-size: 15px; color: var(--amber); }
  .round-feedback .count { font-size: 13px; margin-bottom: 8px; }
  .round-feedback .bias-note { background: rgba(167,139,250,0.08); border-left: 3px solid var(--violet); padding: 8px 12px; font-size: 13px; line-height: 1.5; border-radius: 4px; }
  .round-feedback .bias-note strong { color: var(--violet); }

  .final-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
  .final-panel h2 { color: var(--violet); font-size: 20px; }
  .final-score { font-size: 42px; font-weight: 800; color: var(--amber); margin: 10px 0 4px; }
  .final-subtext { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .reveal-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px; }
  .reveal-table th, .reveal-table td { text-align: left; padding: 7px 9px; border-bottom: 1px solid var(--line); }
  .reveal-table th { color: var(--muted); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .reveal-table tr.eliminated td { color: var(--reject); }
  .reveal-table tr.survived td { color: var(--accept); }
  .reveal-table td.rules { color: var(--muted); font-size: 12px; }

  .reflection { background: rgba(96,165,250,0.06); border-left: 3px solid var(--blue); padding: 12px 16px; border-radius: 4px; font-size: 14px; line-height: 1.55; }
  .reflection strong { color: var(--blue); }

  .submit-score-btn { margin-top: 14px; padding: 11px 22px; background: var(--violet); color: #110624; font-weight: 700; border: none; border-radius: 9px; font-size: 14.5px; cursor: pointer; }
  .submit-score-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="status-bar">
  <div>
    <div><strong id="round-title">Filter Rule #1 of 6</strong></div>
    <div class="progress" id="round-progress">Resumes to judge: 8</div>
  </div>
  <div class="score">Score: <span id="score-display">0</span> / 48</div>
</div>

<h1>Hiring Filter Lab</h1>
<p class="subtitle">You are the AI. Apply each filter rule to the 8 resumes. For every resume, decide <strong>Accept</strong> or <strong>Reject</strong> based on the rule. You'll get instant feedback and see who gets filtered out.</p>

<div id="stage"></div>

<script>
// ============ DATA ============
const RESUMES = [
  { id: 1, name: "Maria S.", age: 24, zip: "07202", edu: "Bachelor's, Rutgers University (2022)", work: "2022–present — Customer Service Rep, Target (continuous, 2+ yrs)", skills: ["Bilingual","Excel","POS"], hasGap: false, topSchool: false, highUnempZip: true, continuousYrs: 3, hasExcel: true, hasAnalytics: false },
  { id: 2, name: "James W.", age: 41, zip: "07078", edu: "MBA, Columbia (2012); BA, NYU (2008)", work: "2020–present — Sr. Analyst, Morgan Stanley; 2015–2020 — Analyst, Citi (continuous)", skills: ["Excel","Python","SQL","Tableau"], hasGap: false, topSchool: true, highUnempZip: false, continuousYrs: 10, hasExcel: true, hasAnalytics: true },
  { id: 3, name: "Devon K.", age: 22, zip: "07206", edu: "Associate's, Union County Community College (2024)", work: "2024–present — Warehouse associate; 8-month gap (2023); 2021–2023 — Retail", skills: ["Forklift","Inventory"], hasGap: true, topSchool: false, highUnempZip: true, continuousYrs: 1, hasExcel: false, hasAnalytics: false },
  { id: 4, name: "Priya R.", age: 28, zip: "07090", edu: "BS, Princeton University (2019)", work: "2019–present — Software Engineer, local startup (5+ yrs continuous)", skills: ["Python","SQL","JavaScript","Excel","Tableau"], hasGap: false, topSchool: true, highUnempZip: false, continuousYrs: 5, hasExcel: true, hasAnalytics: true },
  { id: 5, name: "Tasha B.", age: 19, zip: "07202", edu: "HS diploma (2024); Full-stack bootcamp graduate (2024)", work: "2024–present — Junior developer contractor (continuous)", skills: ["Python","SQL","JavaScript","Excel"], hasGap: false, topSchool: false, highUnempZip: true, continuousYrs: 1, hasExcel: true, hasAnalytics: true },
  { id: 6, name: "Michael D.", age: 37, zip: "07032", edu: "BS, Kean University (2008)", work: "2015–present — Maintenance Supervisor (10 yrs, same employer, continuous)", skills: ["HVAC","Plumbing","Team management"], hasGap: false, topSchool: false, highUnempZip: true, continuousYrs: 10, hasExcel: false, hasAnalytics: false },
  { id: 7, name: "Rosa C.", age: 44, zip: "07206", edu: "HS diploma (1998); Medical coding certificate (2010)", work: "2010–present — Medical billing specialist, same hospital (14 yrs continuous)", skills: ["Excel","ICD-10","EMR systems"], hasGap: false, topSchool: false, highUnempZip: true, continuousYrs: 14, hasExcel: true, hasAnalytics: false },
  { id: 8, name: "Linda P.", age: 57, zip: "07090", edu: "BA, Penn State (1990); Executive leadership certificate (2005)", work: "2000–present — Senior Operations Manager, same company (24 yrs continuous)", skills: ["Excel","Strategic planning","SQL"], hasGap: false, topSchool: false, highUnempZip: false, continuousYrs: 24, hasExcel: true, hasAnalytics: true },
];

// Each rule has: text, hint, eval(r) -> true if REJECT, biasNote shown after submitting.
const RULES = [
  {
    text: "Reject any resume with an employment gap of 6 months or more.",
    hint: "Look for any gap of 6+ months in the work history.",
    eval: (r) => r.hasGap === true,
    biasNote: "This rule disproportionately eliminates caregivers (often women), people with medical histories, and those who were laid off during recessions. An employment gap is not evidence of being a bad worker."
  },
  {
    text: "Accept only candidates from top-50 universities.",
    hint: "Top-50 in this dataset: Columbia, NYU, Princeton, Penn. All others → reject.",
    eval: (r) => r.topSchool === false,
    biasNote: "This rule eliminates first-generation students, community-college transfers, and anyone whose family couldn't afford elite tuition. Career success correlates weakly with school prestige — but this filter makes prestige the gatekeeper anyway."
  },
  {
    text: "Reject any resume from a zip code with more than 20% unemployment.",
    hint: "High-unemployment zips in this dataset: 07202, 07206, 07520, 07032.",
    eval: (r) => r.highUnempZip === true,
    biasNote: "This is digital redlining. Zip-code filters proxy race and class — historically redlined neighborhoods still have higher unemployment decades after the original policies. The AI didn't invent this bias; it inherited it."
  },
  {
    text: "Accept only candidates under age 35.",
    hint: "Age is listed in the top-right of each resume. 35 and older → reject.",
    eval: (r) => r.age >= 35,
    biasNote: "Age discrimination in hiring is illegal under the ADEA, but AI tools routinely encode it through proxies like 'years of experience' or 'graduation year.' Older workers with decades of skill get filtered before a human sees them."
  },
  {
    text: "Reject any resume without 3 or more years of continuous employment.",
    hint: "Look at the longest unbroken stretch at one job. Under 3 years → reject.",
    eval: (r) => r.continuousYrs < 3,
    biasNote: "This rule eliminates new graduates, career changers, and gig workers — even when their skills match perfectly. Tasha (a bootcamp grad with real production Python) gets cut before anyone reads her code."
  },
  {
    text: "Accept only candidates whose skills include Excel AND one of: Python, SQL, or Tableau.",
    hint: "BOTH conditions must be true. Missing either → reject.",
    eval: (r) => !(r.hasExcel && r.hasAnalytics),
    biasNote: "Keyword filters reward candidates who know the ATS game — usually those with insider coaching or recent college prep — over candidates with equivalent real-world experience. Michael runs an HVAC team for ten years; the filter can't see leadership because the keyword isn't there."
  },
];

// ============ STATE ============
let currentRound = 0;          // 0..5 during rule rounds, 6 = final
let selections = [];           // per round: [{resumeId, studentPick: 'accept'|'reject'|null}]
let submittedRounds = [];      // booleans
let totalScore = 0;
const MAX_SCORE = RESUMES.length * RULES.length; // 48

function initRoundState() {
  return RESUMES.map(r => ({ resumeId: r.id, studentPick: null, correct: null }));
}
// Pre-fill selections per round
for (let i = 0; i < RULES.length; i++) selections.push(initRoundState());

// ============ RENDER ============
const stage = document.getElementById("stage");

function updateStatus() {
  if (currentRound < RULES.length) {
    document.getElementById("round-title").textContent = `Filter Rule #${currentRound + 1} of 6`;
    document.getElementById("round-progress").textContent = submittedRounds[currentRound] ? "Round submitted. Review feedback below." : `Resumes to judge: ${RESUMES.length}`;
  } else {
    document.getElementById("round-title").textContent = "All rounds complete";
    document.getElementById("round-progress").textContent = "Final results below.";
  }
  document.getElementById("score-display").textContent = totalScore;
}

function renderRound() {
  stage.innerHTML = "";
  const rule = RULES[currentRound];
  const submitted = submittedRounds[currentRound];

  // Rule panel
  const rp = document.createElement("div");
  rp.className = "rule-panel";
  rp.innerHTML = `
    <div class="rule-label">Rule ${currentRound + 1}</div>
    <div class="rule-text">"${rule.text}"</div>
    <div class="rule-hint">${rule.hint}</div>
  `;
  stage.appendChild(rp);

  // Resume grid
  const grid = document.createElement("div");
  grid.className = "resume-grid";
  RESUMES.forEach((r, idx) => {
    const sel = selections[currentRound][idx];
    const card = document.createElement("div");
    card.className = "resume";
    if (submitted) card.classList.add("disabled", sel.correct ? "result-correct" : "result-wrong");
    card.innerHTML = `
      <div class="resume-head">
        <div>
          <div class="resume-num">#${r.id}</div>
          <div class="resume-name">${r.name}</div>
        </div>
        <div class="resume-meta">Age ${r.age} · Zip ${r.zip}</div>
      </div>
      <div class="resume-row"><strong>Education:</strong> ${r.edu}</div>
      <div class="resume-row"><strong>Work:</strong> ${r.work}</div>
      <div class="resume-row"><strong>Skills:</strong> ${r.skills.join(", ")}</div>
      <div class="choice-row">
        <button class="choice-btn accept ${sel.studentPick === 'accept' ? 'selected' : ''}" data-idx="${idx}" data-pick="accept" ${submitted ? 'disabled' : ''}>Accept</button>
        <button class="choice-btn reject ${sel.studentPick === 'reject' ? 'selected' : ''}" data-idx="${idx}" data-pick="reject" ${submitted ? 'disabled' : ''}>Reject</button>
      </div>
      ${submitted ? renderFeedbackLine(sel, r, rule) : ''}
    `;
    grid.appendChild(card);
  });
  stage.appendChild(grid);

  // Bind buttons
  grid.querySelectorAll(".choice-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (submittedRounds[currentRound]) return;
      const idx = +btn.dataset.idx;
      const pick = btn.dataset.pick;
      selections[currentRound][idx].studentPick = pick;
      renderRound();
    });
  });

  // Submit / Next row
  const row = document.createElement("div");
  row.className = "submit-row";
  if (!submitted) {
    const allPicked = selections[currentRound].every(s => s.studentPick !== null);
    row.innerHTML = `
      <div class="progress" style="color: var(--muted); font-size: 13px;">${selections[currentRound].filter(s => s.studentPick !== null).length} / ${RESUMES.length} judged</div>
      <button class="submit-btn" id="submitRound" ${allPicked ? '' : 'disabled'}>Run the Filter →</button>
    `;
    stage.appendChild(row);
    document.getElementById("submitRound").addEventListener("click", submitRound);
  } else {
    // Round feedback
    renderRoundFeedback();
    const nextLabel = currentRound === RULES.length - 1 ? "See Final Results →" : "Next Rule →";
    row.innerHTML = `<div></div><button class="submit-btn next ${currentRound === RULES.length - 1 ? 'finish' : ''}" id="nextRound">${nextLabel}</button>`;
    stage.appendChild(row);
    document.getElementById("nextRound").addEventListener("click", () => {
      currentRound++;
      if (currentRound >= RULES.length) {
        renderFinal();
      } else {
        renderRound();
      }
      updateStatus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  updateStatus();
}

function renderFeedbackLine(sel, resume, rule) {
  const aiSaysReject = rule.eval(resume);
  const aiChoice = aiSaysReject ? 'reject' : 'accept';
  if (sel.correct) {
    return `<div class="feedback-line ok">✓ Correct — AI ${aiChoice}s.</div>`;
  } else {
    return `<div class="feedback-line no">✗ Wrong — AI would ${aiChoice}, you said ${sel.studentPick}.</div>`;
  }
}

function submitRound() {
  const rule = RULES[currentRound];
  let roundCorrect = 0;
  selections[currentRound].forEach((sel, idx) => {
    const r = RESUMES[idx];
    const aiSaysReject = rule.eval(r);
    const aiChoice = aiSaysReject ? 'reject' : 'accept';
    sel.correct = sel.studentPick === aiChoice;
    if (sel.correct) roundCorrect++;
  });
  totalScore += roundCorrect;
  submittedRounds[currentRound] = true;
  // Send interim score (not final)
  sendScore(false);
  renderRound();
}

function renderRoundFeedback() {
  const rule = RULES[currentRound];
  const rejected = RESUMES.filter(r => rule.eval(r));
  const roundCorrect = selections[currentRound].filter(s => s.correct).length;
  const rfb = document.createElement("div");
  rfb.className = "round-feedback";
  rfb.innerHTML = `
    <h3>Rule ${currentRound + 1} Results</h3>
    <div class="count">You got <strong>${roundCorrect} / ${RESUMES.length}</strong> right this round. The AI rejected <strong>${rejected.length}</strong> candidate${rejected.length === 1 ? '' : 's'}: ${rejected.map(r => r.name).join(", ") || "none"}.</div>
    <div class="bias-note"><strong>What this rule actually does:</strong> ${rule.biasNote}</div>
  `;
  stage.appendChild(rfb);
}

function renderFinal() {
  // Compute per-resume: which rules rejected them
  const perResume = RESUMES.map(r => {
    const rejectedBy = [];
    RULES.forEach((rule, i) => { if (rule.eval(r)) rejectedBy.push(i + 1); });
    return { r, rejectedBy };
  });
  const survivors = perResume.filter(x => x.rejectedBy.length === 0);

  stage.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "final-panel";
  const pct = Math.round((totalScore / MAX_SCORE) * 100);
  panel.innerHTML = `
    <h2>The Bias Reveal</h2>
    <div class="final-score">${totalScore} / ${MAX_SCORE}</div>
    <div class="final-subtext">${pct}% of your filter decisions matched what the AI would do. This score measures whether you can *predict the AI's behavior* — not whether the AI is right.</div>

    <table class="reveal-table">
      <thead>
        <tr><th>Candidate</th><th>Rejected By</th><th>Status</th></tr>
      </thead>
      <tbody>
        ${perResume.map(x => `
          <tr class="${x.rejectedBy.length === 0 ? 'survived' : 'eliminated'}">
            <td>${x.r.name} (${x.r.age}, ${x.r.zip})</td>
            <td class="rules">${x.rejectedBy.length === 0 ? '—' : 'Rules ' + x.rejectedBy.join(', ')}</td>
            <td>${x.rejectedBy.length === 0 ? 'Passed all 6 filters' : 'Eliminated'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    <div class="reflection">
      <strong>What happened:</strong> ${survivors.length} of ${RESUMES.length} candidates survived all six filters: ${survivors.map(x => x.r.name).join(", ") || "nobody"}. Every one of the eliminated candidates has real skills a hiring manager would want to see. None of them committed a crime — they just had a gap, a zip code, an age, or a school that didn't match the pattern. This is what 98% of Fortune 500 companies are doing to resumes right now.
    </div>

    <button class="submit-score-btn" id="submitFinal">Submit Score & Complete Lesson Activity</button>
  `;
  stage.appendChild(panel);
  document.getElementById("submitFinal").addEventListener("click", () => {
    sendScore(true);
    const btn = document.getElementById("submitFinal");
    btn.textContent = "Score Submitted ✓";
    btn.disabled = true;
    btn.style.opacity = "0.6";
  });
  // Auto-send on reveal too
  sendScore(true);
}

// ============ POSTMESSAGE ============
function sendScore(gameComplete) {
  const pct = totalScore / MAX_SCORE;
  const scoreVal = Math.round(pct * 5 * 100) / 100;
  if (scoreVal <= 0 && !gameComplete) return;
  try {
    window.parent.postMessage({
      type: 'activityScore',
      score: Math.max(0, scoreVal),
      maxScore: 5,
      gameComplete: gameComplete,
      completedAt: new Date().toISOString()
    }, '*');
  } catch (e) {}
}

// ============ INIT ============
renderRound();
</script>
</body>
</html>
