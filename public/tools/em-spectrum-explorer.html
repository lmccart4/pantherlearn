<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EM Spectrum Explorer</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --ink:#f1f5f9; --accent:#38bdf8; --ok:#34d399; --warn:#fbbf24; --bad:#f87171; --muted:#94a3b8; }
  * { box-sizing:border-box; } html,body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif;}
  .wrap{max-width:920px;margin:0 auto;padding:16px;}
  header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;}
  h1{font-size:20px;margin:0;}
  .lang{background:var(--panel);border:1px solid #334155;color:var(--ink);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;}
  .hint{font-size:13px;color:var(--muted);margin:0 0 14px;}
  .spectrum{position:relative;height:96px;background:#0b1220;border:1px solid #334155;border-radius:12px;margin-bottom:8px;overflow:visible;}
  .band{position:absolute;top:0;height:100%;border-right:1px solid #1e293b;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;min-width:28px;}
  .band:last-child{border-right:none;}
  .band-name{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .band-freq{font-size:9px;color:var(--muted);white-space:nowrap;}
  .axis{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:14px;padding:0 4px;}
  .tech-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .tech-row{display:grid;grid-template-columns:minmax(120px,1fr) 140px 140px 32px;gap:8px;align-items:center;background:var(--panel);border:1px solid #334155;border-radius:10px;padding:10px 12px;}
  .tech-name{font-size:14px;font-weight:500;}
  .tech-hint{font-size:11px;color:var(--muted);grid-column:1 / -1;margin-top:4px;}
  select{background:#0b1220;border:1px solid #334155;color:var(--ink);border-radius:6px;padding:6px 8px;font-size:13px;width:100%;}
  .status{font-size:16px;text-align:center;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .primary{flex:1;min-width:160px;padding:10px;border-radius:8px;border:1px solid var(--accent);background:#0b1220;color:var(--accent);font-size:14px;cursor:pointer;}
  .primary:hover{background:#0f172a;}
  .secondary{padding:10px 14px;border-radius:8px;border:1px solid #334155;background:var(--panel);color:var(--ink);font-size:14px;cursor:pointer;}
  #scoreBox{font-size:13px;color:var(--muted);}
  @media (max-width:620px){
    .tech-row{grid-template-columns:1fr 1fr;}
    .tech-name{grid-column:1 / -1;}
    .status{grid-column:1 / -1;text-align:left;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="titleEl"></h1>
    <button class="lang" id="langBtn"></button>
  </header>
  <p class="hint" id="promptEl"></p>

  <div class="spectrum" id="spectrum"></div>
  <div class="axis">
    <span id="lowFreq"></span>
    <span id="midFreq"></span>
    <span id="highFreq"></span>
  </div>

  <div class="tech-list" id="techList"></div>

  <div class="actions">
    <button class="primary" id="submitBtn"></button>
    <button class="secondary" id="resetBtn"></button>
  </div>
  <div id="scoreBox"></div>
</div>

<script type="module">
import {
  BANDS, TECHNOLOGIES, INTERACTIONS, emptyState, scoreState, isComplete, bandPosition
} from "./em-spectrum-explorer-model.js";
import { makeTranslator, makeStateSaver, sendActivityScore } from "./embed-kit.js";

const DICT = {
  title: { en: "EM Spectrum Explorer", es: "Explorador del Espectro EM" },
  langName: { en: "🌐 Español", es: "🌐 English" },
  prompt: { en: "Place each technology on the logarithmic spectrum and match it to its typical matter interaction.", es: "Coloca cada tecnología en el espectro logarítmico y empareja su interacción típica con la materia." },
  lowFreq: { en: "low frequency / long wavelength", es: "baja frecuencia / onda larga" },
  midFreq: { en: "frequency →", es: "frecuencia →" },
  highFreq: { en: "high frequency / short wavelength", es: "alta frecuencia / onda corta" },
  bandPlaceholder: { en: "Select band", es: "Elige banda" },
  interactionPlaceholder: { en: "Select interaction", es: "Elige interacción" },
  submit: { en: "Submit Score", es: "Enviar Puntuación" },
  submitted: { en: "✓ Submitted", es: "✓ Enviado" },
  scoreLbl: { en: "Score", es: "Puntuación" },
  reset: { en: "Reset", es: "Reiniciar" },
  complete: { en: "All placed — score auto-sent.", es: "Todo colocado — puntuación enviada automáticamente." },
};

const tr = makeTranslator(DICT, "en");
const saver = makeStateSaver({});

let state = emptyState();
let submitted = false;

function txt(obj) { return obj?.[tr.lang] ?? obj?.en ?? ""; }

function renderSpectrum() {
  const host = document.getElementById("spectrum");
  host.innerHTML = "";
  for (const b of BANDS) {
    const pos = bandPosition(b);
    const el = document.createElement("div");
    el.className = "band";
    el.style.left = pos.left + "%";
    el.style.width = pos.width + "%";
    el.style.background = b.color + "22";
    el.style.borderColor = b.color + "55";
    el.innerHTML = `<div class="band-name" style="color:${b.color}">${txt(b.label)}</div><div class="band-freq">${txt(b.freq)}</div>`;
    host.appendChild(el);
  }
  document.getElementById("lowFreq").textContent = tr.t("lowFreq");
  document.getElementById("midFreq").textContent = tr.t("midFreq");
  document.getElementById("highFreq").textContent = tr.t("highFreq");
}

function statusSymbol(t) {
  const s = state.techs[t.id];
  const bandOk = s.bandId === t.correctBand;
  const interactionOk = s.interactionId === t.correctInteraction;
  if (!submitted) return "";
  if (bandOk && interactionOk) return "✓";
  if (bandOk || interactionOk) return "◐";
  return "✗";
}

function renderTechList() {
  const host = document.getElementById("techList");
  host.innerHTML = "";
  for (const t of TECHNOLOGIES) {
    const s = state.techs[t.id];

    const row = document.createElement("div");
    row.className = "tech-row";

    const name = document.createElement("div");
    name.className = "tech-name";
    name.textContent = txt(t.name);
    row.appendChild(name);

    const bandSel = document.createElement("select");
    bandSel.innerHTML = `<option value="">${tr.t("bandPlaceholder")}</option>` +
      BANDS.map(b => `<option value="${b.id}" ${s.bandId === b.id ? "selected" : ""}>${txt(b.label)}</option>`).join("");
    bandSel.onchange = (e) => { state.techs[t.id].bandId = e.target.value; onChange(); };
    row.appendChild(bandSel);

    const intSel = document.createElement("select");
    intSel.innerHTML = `<option value="">${tr.t("interactionPlaceholder")}</option>` +
      INTERACTIONS.map(i => `<option value="${i.id}" ${s.interactionId === i.id ? "selected" : ""}>${txt(i.label)}</option>`).join("");
    intSel.onchange = (e) => { state.techs[t.id].interactionId = e.target.value; onChange(); };
    row.appendChild(intSel);

    const st = document.createElement("div");
    st.className = "status";
    st.textContent = statusSymbol(t);
    st.style.color = statusSymbol(t) === "✓" ? "var(--ok)" : statusSymbol(t) === "✗" ? "var(--bad)" : "var(--warn)";
    row.appendChild(st);

    if (submitted) {
      const hint = document.createElement("div");
      hint.className = "tech-hint";
      hint.textContent = txt(t.hint);
      row.appendChild(hint);
    }

    host.appendChild(row);
  }
}

function renderStaticText() {
  document.getElementById("titleEl").textContent = tr.t("title");
  document.getElementById("langBtn").textContent = tr.t("langName");
  document.getElementById("promptEl").textContent = tr.t("prompt");
  document.getElementById("submitBtn").textContent = tr.t("submit");
  document.getElementById("resetBtn").textContent = tr.t("reset");
}

function sendScoreIfComplete() {
  if (isComplete(state)) {
    const r = scoreState(state);
    sendActivityScore(r.score, 5, true);
    return r.score;
  }
  return null;
}

function onChange() {
  submitted = false;
  saveState();
  render();
  sendScoreIfComplete();
}

function saveState() {
  saver.save({ state, submitted });
}

function submitAll() {
  const r = scoreState(state);
  sendActivityScore(r.score, 5, true); // ALWAYS re-send, no guard
  submitted = true;
  saveState();
  const box = document.getElementById("scoreBox");
  box.textContent = `${tr.t("submitted")} — ${tr.t("scoreLbl")}: ${r.score}/5`;
  if (isComplete(state)) box.textContent += ` · ${tr.t("complete")}`;
  render();
}

function resetAll() {
  state = emptyState();
  submitted = false;
  document.getElementById("scoreBox").textContent = "";
  saveState();
  render();
}

function render() {
  renderStaticText();
  renderSpectrum();
  renderTechList();
}

document.getElementById("langBtn").onclick = () => { tr.setLang(tr.lang === "en" ? "es" : "en"); render(); };
document.getElementById("submitBtn").onclick = submitAll;
document.getElementById("resetBtn").onclick = resetAll;
window.addEventListener("beforeunload", () => saver.flush());

render();
</script>
</body>
</html>
