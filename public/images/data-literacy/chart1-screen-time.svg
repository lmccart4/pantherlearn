<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="600">Phone Screen Time by Age Group</text>
  <text x="300" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Average Daily Hours</text>

  <!-- Y-axis (DELIBERATELY starts at 4, not 0) -->
  <line x1="120" y1="80" x2="120" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Y-axis labels (4.0 to 5.5) -->
  <text x="110" y="324" text-anchor="end" fill="#94a3b8" font-size="12">4.0</text>
  <line x1="120" y1="320" x2="500" y2="320" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <text x="110" y="244" text-anchor="end" fill="#94a3b8" font-size="12">4.5</text>
  <line x1="120" y1="240" x2="500" y2="240" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <text x="110" y="164" text-anchor="end" fill="#94a3b8" font-size="12">5.0</text>
  <line x1="120" y1="160" x2="500" y2="160" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <text x="110" y="84" text-anchor="end" fill="#94a3b8" font-size="12">5.5</text>
  <line x1="120" y1="80" x2="500" y2="80" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <!-- X-axis -->
  <line x1="120" y1="320" x2="500" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Teens bar: 5.2 hours → on scale 4.0-5.5, that's (5.2-4.0)/(5.5-4.0) = 0.8 of 240px = 192px -->
  <rect x="175" y="128" width="100" height="192" rx="6" fill="url(#bar1)" opacity="0.9"/>
  <text x="225" y="118" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">5.2 hrs</text>

  <!-- Adults bar: 4.8 hours → (4.8-4.0)/(5.5-4.0) = 0.533 of 240px = 128px -->
  <rect x="335" y="192" width="100" height="128" rx="6" fill="url(#bar2)" opacity="0.9"/>
  <text x="385" y="182" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">4.8 hrs</text>

  <!-- X-axis labels -->
  <text x="225" y="345" text-anchor="middle" fill="#e2e8f0" font-size="14">Teens</text>
  <text x="385" y="345" text-anchor="middle" fill="#e2e8f0" font-size="14">Adults</text>

  <!-- Source -->
  <text x="300" y="385" text-anchor="middle" fill="#64748b" font-size="10">Source: National Screen Time Survey, 2024</text>
</svg>