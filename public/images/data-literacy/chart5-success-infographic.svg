<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background — warm, Instagram-style -->
  <rect width="600" height="400" rx="16" fill="url(#bg5)"/>

  <!-- Decorative elements — minimal wellness brand aesthetic -->
  <circle cx="80" cy="60" r="40" fill="#fbbf24" opacity="0.3"/>
  <circle cx="520" cy="340" r="50" fill="#f59e0b" opacity="0.2"/>
  <circle cx="540" cy="80" r="25" fill="#fbbf24" opacity="0.25"/>

  <!-- Sun icon -->
  <g transform="translate(300, 90)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#92400e" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="14" fill="#f59e0b"/>
    <!-- Sun rays -->
    <line x1="0" y1="-34" x2="0" y2="-42" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="34" x2="0" y2="42" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-34" y1="0" x2="-42" y2="0" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="0" x2="42" y2="0" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-24" y1="-24" x2="-30" y2="-30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="-24" x2="30" y2="-30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-24" y1="24" x2="-30" y2="30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="24" x2="30" y2="30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Main statistic — big and bold -->
  <text x="300" y="195" text-anchor="middle" fill="#78350f" font-size="52" font-weight="800">90%</text>
  <text x="300" y="230" text-anchor="middle" fill="#92400e" font-size="18" font-weight="600">of successful people</text>
  <text x="300" y="255" text-anchor="middle" fill="#92400e" font-size="18" font-weight="600">wake up before 6 AM</text>

  <!-- Divider line -->
  <line x1="200" y1="275" x2="400" y2="275" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>

  <!-- CTA text -->
  <text x="300" y="305" text-anchor="middle" fill="#a16207" font-size="14" font-weight="500">Start your morning routine today.</text>

  <!-- Brand-style footer -->
  <text x="300" y="340" text-anchor="middle" fill="#b45309" font-size="11" font-weight="600" letter-spacing="3">@RISEANDSUCCEED</text>

  <!-- Deliberately: NO source, NO definition of "successful", NO sample size -->
</svg>