<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="600">Global Average Temperature Anomaly</text>
  <text x="300" y="54" text-anchor="middle" fill="#94a3b8" font-size="12">Relative to 1901–2000 average (°C)</text>

  <!-- Axes -->
  <line x1="80" y1="80" x2="80" y2="320" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="320" x2="560" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="70" y="84" text-anchor="end" fill="#94a3b8" font-size="11">+1.0</text>
  <line x1="80" y1="80" x2="560" y2="80" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>

  <text x="70" y="144" text-anchor="end" fill="#94a3b8" font-size="11">+0.5</text>
  <line x1="80" y1="140" x2="560" y2="140" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>

  <text x="70" y="204" text-anchor="end" fill="#94a3b8" font-size="11">0.0</text>
  <line x1="80" y1="200" x2="560" y2="200" stroke="#334155" stroke-width="1"/>

  <text x="70" y="264" text-anchor="end" fill="#94a3b8" font-size="11">−0.5</text>
  <line x1="80" y1="260" x2="560" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>

  <text x="70" y="324" text-anchor="end" fill="#94a3b8" font-size="11">−1.0</text>

  <!-- X-axis labels -->
  <text x="80" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">1900</text>
  <text x="176" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">1920</text>
  <text x="272" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">1940</text>
  <text x="368" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">1960</text>
  <text x="464" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">1980</text>
  <text x="560" y="340" text-anchor="middle" fill="#94a3b8" font-size="11">2023</text>

  <!-- Temperature line — flat early, rising from 1980s -->
  <!-- 0°C anomaly = y:200, each 0.1°C = 12px -->
  <!-- Area fill under the line -->
  <path d="M80,236 L100,240 L120,232 L140,228 L160,236 L176,220 L196,228 L216,224 L236,220 L252,216 L272,212 L292,208 L308,212 L328,204 L348,200 L368,196 L388,192 L400,184 L420,172 L440,160 L460,148 L476,136 L492,124 L508,116 L524,108 L540,96 L560,88 L560,320 L80,320 Z"
    fill="url(#lineGrad)" opacity="0.15"/>

  <!-- The actual line -->
  <polyline
    points="80,236 100,240 120,232 140,228 160,236 176,220 196,228 216,224 236,220 252,216 272,212 292,208 308,212 328,204 348,200 368,196 388,192 400,184 420,172 440,160 460,148 476,136 492,124 508,116 524,108 540,96 560,88"
    fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Endpoint dot -->
  <circle cx="560" cy="88" r="4" fill="#f43f5e"/>
  <text x="548" y="80" text-anchor="end" fill="#f43f5e" font-size="11" font-weight="600">+0.85°C</text>

  <!-- Source -->
  <text x="300" y="375" text-anchor="middle" fill="#64748b" font-size="10">Source: NASA Goddard Institute for Space Studies (GISS)</text>

  <!-- Y-axis title -->
  <text x="24" y="200" text-anchor="middle" fill="#94a3b8" font-size="10" transform="rotate(-90, 24, 200)">Temperature Anomaly (°C)</text>
</svg>