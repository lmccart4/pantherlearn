  <text x="82" y="324" text-anchor="end" fill="#94a3b8" font-size="11">$8.0M</text>
  <text x="82" y="260.25" text-anchor="end" fill="#94a3b8" font-size="11">$8.25M</text>
  <text x="82" y="196.5" text-anchor="end" fill="#94a3b8" font-size="11">$8.5M</text>
  <text x="82" y="132.75" text-anchor="end" fill="#94a3b8" font-size="11">$8.75M</text>
  <text x="82" y="69" text-anchor="end" fill="#94a3b8" font-size="11">$9.0M</text>

