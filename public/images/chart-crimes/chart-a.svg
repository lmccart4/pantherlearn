<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" style="background:#1a1f2e; font-family: system-ui, -apple-system, sans-serif; border-radius:10px;">
  <!-- Title -->
  <text x="310" y="26" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Monthly Streaming Revenue (Jan–Jun)</text>
  <!-- Subtitle badge -->
  <rect x="200" y="34" width="220" height="20" rx="4" fill="#2a1515"/>
  <text x="310" y="48" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">Chart A — Y-axis starts at $8,000,000</text>

  <!-- Grid lines -->
  <line x1="90" y1="320" x2="570" y2="320" stroke="#2a3044" stroke-width="1"/>
  <line x1="90" y1="256.25" x2="570" y2="256.25" stroke="#2a3044" stroke-width="1"/>
  <line x1="90" y1="192.5" x2="570" y2="192.5" stroke="#2a3044" stroke-width="1"/>
  <line x1="90" y1="128.75" x2="570" y2="128.75" stroke="#2a3044" stroke-width="1"/>
  <line x1="90" y1="65" x2="570" y2="65" stroke="#2a3044" stroke-width="1"/>

  <!-- Fill area under line -->
  <polygon points="90,320 90,269.00000000000017 186,243.49999999999983 282,192.5 378,167.00000000000009 474,141.50000000000017 570,90.49999999999991 570,320" fill="rgba(245,158,11,0.12)"/>

  <!-- Line -->
  <polyline points="90,269.00000000000017 186,243.49999999999983 282,192.5 378,167.00000000000009 474,141.50000000000017 570,90.49999999999991" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

