  <circle cx="90" cy="269.00000000000017" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>
  <circle cx="186" cy="243.49999999999983" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>
  <circle cx="282" cy="192.5" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>
  <circle cx="378" cy="167.00000000000009" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>
  <circle cx="474" cy="141.50000000000017" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>
  <circle cx="570" cy="90.49999999999991" r="4.5" fill="#f59e0b" stroke="#1a1f2e" stroke-width="1.5"/>

